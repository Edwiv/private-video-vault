<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#111827" />
    <title>Private Video Vault</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=16" />
  </head>
  <body class="is-locked">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <p class="eyebrow">Private Video Vault</p>
          <h1>视频保险库</h1>
        </div>
        <div class="session-actions">
          <div class="status-pill" id="appStatus">离线就绪</div>
          <button class="secondary-button logout-button" id="logoutButton" type="button">退出</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel vault-panel" aria-labelledby="vaultTitle">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Vault</p>
              <h2 id="vaultTitle">解锁</h2>
            </div>
            <button class="icon-button" id="clearConfigButton" type="button" title="清除配置" aria-label="清除配置">
              <span aria-hidden="true">↺</span>
            </button>
          </div>

          <form class="vault-form" id="vaultForm">
            <label>
              <span>仓库地址</span>
              <input
                id="vaultOrigin"
                name="vaultOrigin"
                autocomplete="url"
                inputmode="url"
                placeholder="https://vault.home.example"
                required
              />
            </label>
            <label>
              <span>索引文件</span>
              <input id="manifestPath" name="manifestPath" autocomplete="off" value="/library.enc.json" required />
            </label>
            <details class="key-panel" open>
              <summary class="key-summary">
                <span>设备密钥</span>
                <strong id="keyStatus">未生成</strong>
              </summary>
              <textarea id="publicKey" rows="6" readonly placeholder="生成后显示公钥"></textarea>
              <label>
                <span>备份口令</span>
                <input id="backupPassphrase" name="backupPassphrase" type="password" autocomplete="new-password" />
              </label>
              <textarea id="keyBackup" rows="6" placeholder="生成后显示加密私钥备份，也可以粘贴备份后导入"></textarea>
              <div class="actions key-actions">
                <button class="secondary-button" id="generateKeyButton" type="button">生成密钥</button>
                <button class="secondary-button" id="copyPublicKeyButton" type="button">复制公钥</button>
              </div>
              <div class="actions key-actions">
                <button class="secondary-button" id="copyKeyBackupButton" type="button">复制备份</button>
                <button class="secondary-button" id="importKeyBackupButton" type="button">导入备份</button>
              </div>
            </details>
            <label>
              <span>兼容口令</span>
              <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" />
            </label>
            <div class="actions">
              <button class="primary-button" type="submit">解锁</button>
              <button class="secondary-button" id="loadSampleButton" type="button">载入示例</button>
            </div>
          </form>
        </aside>

        <div class="content-area">
          <section class="player-zone" aria-label="播放器">
            <div class="player-frame">
              <video class="video-player" id="videoPlayer" controls playsinline preload="metadata"></video>
            </div>
            <div class="now-playing">
              <div>
                <p class="eyebrow">Now Playing</p>
                <h2 id="nowPlayingTitle">未选择视频</h2>
              </div>
              <p id="nowPlayingMeta">等待解锁片库</p>
            </div>
          </section>

          <section class="panel library-panel" aria-labelledby="libraryTitle">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Library</p>
                <h2 id="libraryTitle">片库</h2>
              </div>
              <span class="count-badge" id="libraryCount">0</span>
            </div>

            <div class="library-stats" aria-label="片库统计">
              <div>
                <span>文件夹</span>
                <strong id="folderCount">0</strong>
              </div>
              <div>
                <span>可播放</span>
                <strong id="sourceCount">0</strong>
              </div>
              <div>
                <span>总时长</span>
                <strong id="durationTotal">--</strong>
              </div>
            </div>

            <div class="library-toolbar">
              <label class="search-field">
                <span>搜索</span>
                <input id="librarySearch" type="search" autocomplete="off" placeholder="片名或文件夹" />
              </label>
              <label class="sort-field">
                <span>排序</span>
                <select id="sortMode">
                  <option value="title">名称</option>
                  <option value="path">文件夹</option>
                  <option value="duration">时长</option>
                  <option value="recent">最近播放</option>
                </select>
              </label>
              <div class="toolbar-actions" aria-label="片库操作">
                <button class="secondary-button compact-button" id="expandAllButton" type="button">展开</button>
                <button class="secondary-button compact-button" id="collapseAllButton" type="button">收起</button>
              </div>
            </div>

            <div class="library-list" id="libraryList" aria-live="polite"></div>
          </section>
        </div>
      </main>
    </div>

    <template id="videoItemTemplate">
      <button class="video-item" type="button">
        <span class="poster"></span>
        <span class="video-copy">
          <strong></strong>
          <small></small>
        </span>
      </button>
    </template>

    <script type="module" src="./app.js?v=16"></script>
  </body>
</html>
